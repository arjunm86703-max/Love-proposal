<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Someone Special ❤️</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff4f9a,#8a5cff,#ffd166);background-size:400% 400%;animation:bg 10s infinite;color:#fff;overflow:hidden}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
.wrap{display:flex;height:100vh;justify-content:center;align-items:center}
.card{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);padding:30px;border-radius:20px;text-align:center;position:relative}
button{padding:12px 24px;border:none;border-radius:30px;font-size:18px;cursor:pointer}
#yes{background:#22c55e;color:#fff}
#no{background:#ef4444;color:#fff;position:absolute;left:180px;top:150px}
.heart{position:fixed;animation:fall 6s linear forwards}
@keyframes fall{from{transform:translateY(-10vh)}to{transform:translateY(110vh)}}
#music{position:fixed;top:10px;right:10px}
</style></head>
<body>
<audio id="bgm" loop><source src="music.mp3" type="audio/mpeg"></audio>
<button id="music" onclick="document.getElementById('bgm').play()">🎵 Play Music</button>
<div class="wrap"><div class="card">
<h1>❤️ Will You Be Mine? ❤️</h1>
<p>I really like you. Will you be my girlfriend? 💖</p>
<button id="yes" onclick="document.body.innerHTML='<div class=wrap><div class=card><h1>🥹 Thank You! ❤️</h1><h2>You made my day 🌹</h2></div></div>'">YES ❤️</button>
<button id="no">NO 😅</button>
</div></div>
<script>
const n=document.getElementById('no');
function mv(){n.style.left=Math.random()*(innerWidth-100)+'px';n.style.top=Math.random()*(innerHeight-60)+'px';}
n.onmouseover=mv;n.onclick=mv;
setInterval(()=>{let h=document.createElement('div');h.className='heart';h.textContent='❤️';h.style.left=Math.random()*100+'vw';h.style.fontSize=(20+Math.random()*20)+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),6000)},250);
</script>
</body></html>
