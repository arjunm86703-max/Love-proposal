<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4e8a,#ff9eb5);
overflow:hidden;
font-family:Arial,sans-serif;
}

.box{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.3);
z-index:10;
}

h1{
color:#e91e63;
margin-bottom:15px;
}

p{
font-size:20px;
margin-bottom:20px;
height:30px;
}

button{
padding:12px 28px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
}

#yes{
background:#28a745;
color:white;
margin-right:15px;
}

#no{
background:#ff1744;
color:white;
position:absolute;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-100vh);}
}
</style>

</head>
<body>

<div class="box">
<h1>❤️ Hey lux... ❤️</h1>

<p id="text"></p>

<button id="yes" onclick="yes()">YES ❤️</button>
<button id="no">NO 😅</button>

</div>

<script>

const msg="ketti vittil kond pokatte ninte ee chettan ?😹💖";
let i=0;

function type(){
if(i<msg.length){
document.getElementById("text").innerHTML+=msg.charAt(i);
i++;
setTimeout(type,70);
}
}
type();

const no=document.getElementById("no");

function move(){
no.style.left=Math.random()*(window.innerWidth-100)+"px";
no.style.top=Math.random()*(window.innerHeight-60)+"px";
}

no.addEventListener("mouseover",move);
no.addEventListener("click",move);

function yes(){
document.body.innerHTML="<div style='display:flex;justify-content:center;align-items:center;height:100vh;background:#ffdde1;font-family:Arial;text-align:center;'><div><h1>🥹❤️ Thank You ❤️🥹</h1><h2>You made me the happiest person today! 🌹</h2><h1>💍💕</h1></div></div>";
}

setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(20+Math.random()*25)+"px";
document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);
},300);

</script>

</body>
</html>
